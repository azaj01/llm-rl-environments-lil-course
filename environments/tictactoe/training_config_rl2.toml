# EXAMPLE TRAINING CONFIG (rename it to training_config.toml)
# Suitable for 2 x Nvidia A6000 (48 GB VRAM)

model = "anakin87/mr-ttt-snk5-merged"

[env]
id = "anakin87/tictactoe"

[env.args]
min_random_move_prob = 0.0
max_random_move_prob = 0.25
use_think = true
max_turns = 7
num_examples = 24000
window_size = 60


[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "tictactoe"

# patched
use_liger = false


# Batch configuration:
# - rollouts_per_example: completions generated per prompt (group size)
# - micro_batch_size: rollouts processed per GPU per gradient accumulation step
# - batch_size: total rollouts per training step (must be divisible by micro_batch_size and rollouts_per_example)
micro_batch_size = 24
rollouts_per_example = 8
batch_size = 480

lora_rank = 8

max_tokens = 64
max_seq_len = 384  # Sequence length: max tokens for full conversation (prompt + all turns)

max_steps = 400

shuffle_dataset = false
learning_rate = 3e-5
temperature = 1.25

# Hub configuration
# (https://huggingface.co/docs/transformers/v4.57.3/en/main_classes/trainer#transformers.TrainingArguments)
push_to_hub = true
hub_model_id = "anakin87/mr-ttt-harder-mixed4"
hub_strategy = "every_save"
save_strategy = "steps"
save_steps = 5
save_total_limit = 1
