# EXAMPLE TRAINING CONFIG (rename it to training_config.toml)
# Suitable for 2 x Nvidia A6000 (48 GB VRAM)

model = "anakin87/lfm-2.6-ttt-sft"

[env]
id = "anakin87/tictactoe"

[env.args]
min_random_move_prob = 0.2
max_random_move_prob = 0.7
use_think = true
max_turns = 7
num_examples = 19200
window_size = 32


[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
run_name = "tictactoe"

# patched
use_liger = false

# Batch configuration:
# - rollouts_per_example: completions generated per prompt (group size)
# - micro_batch_size: rollouts processed per GPU per gradient accumulation step
# - batch_size: total rollouts per training step (must be divisible by micro_batch_size and rollouts_per_example)
micro_batch_size = 8
rollouts_per_example = 8
batch_size = 256

lora_rank = 8

max_tokens = 128
max_seq_len = 768  # Sequence length: max tokens for full conversation (prompt + all turns)

max_steps = 600

shuffle_dataset = false
learning_rate = 5e-5

# Hub configuration
# (https://huggingface.co/docs/transformers/v4.57.3/en/main_classes/trainer#transformers.TrainingArguments)
push_to_hub = true
hub_model_id = "anakin87/mr-ttt-snk5"
hub_strategy = "every_save"
save_strategy = "steps"
save_steps = 5
save_total_limit = 1
